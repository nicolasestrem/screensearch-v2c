name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

# Cancel an in-flight (expensive) review when the PR is updated again, so rapid
# pushes don't stack multiple ~15-min review runs.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      # write is REQUIRED for the action to post the review + inline comments.
      # With read-only the agent's post attempts are denied and nothing appears
      # (the original cause of "no review posted").
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # --comment is REQUIRED: without it the /code-review skill produces the
          # review as output but never posts it ("No buffered inline comments").
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment'
          # show_full_output prints the agent's tool calls (incl. any permission
          # denials) so failures are diagnosable instead of hidden.
          show_full_output: true
          # Grant the tools the code-review plugin needs. The very first step is a
          # `gh` call to fetch the PR diff; without Bash(gh:*) it is denied and the
          # review exits after ~2 turns having reviewed nothing.
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(gh:*)",
                  "Bash(git diff:*)",
                  "Bash(git log:*)",
                  "Bash(git show:*)",
                  "Read",
                  "Glob",
                  "Grep",
                  "mcp__github_inline_comment__create_inline_comment"
                ]
              }
            }
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
